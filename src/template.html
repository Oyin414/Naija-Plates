<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="./#hero" class="title">Naija Plates</a>
        <button class="nav_toggle" aria-label="open navigation menu">
          <span class="nav_bar"></span>
          <span class="nav_bar"></span>
          <span class="nav_bar"></span>
        </button>

        <ul class="nav_links">
          <li><a href="./#hero">Home</a></li>
          <li><a href="./#about">About</a></li>
          <li><a href="./#recipes">Recipes</a></li>
        </ul>
      </nav>
    </header>
    <hr />
    <main id="main">
      <section id="hero">
        <h1>Explore Our traditional, Nigerian Recipes</h1>
        <p>
          Learn how to cook traditional Nigerian dishes that taste amazing.Use
          the search bar to find the recipe by name, or scroll through the
          recipes till something delicious catches your eye.
        </p>
      </section>
      <form action="" id="form">
        <input
          type="search"
          name="recipes"
          id="recipes-search"
          placeholder="Search by name"
          required
        />
        <button type="submit" id="submit">Submit</button>
        <select name="prep" id="prep">
          <option value="">Prep Time</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="45">45 minutes</option>
          <option value="60">60 minutes</option>
          <option value="75">75 minutes</option>
        </select>
        <select name="cook" id="cook">
          <option value="">Cook Time</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="45">45 minutes</option>
          <option value="60">60 minutes</option>
          <option value="75">75 minutes</option>
        </select>
        <select name="category" id="category">
          <option value="">All Categories</option>
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
          <option value="dinner">Dinner</option>
          <option value="desserts">Desserts</option>
          <option value="snacks">Snacks</option>
          <option value="vegetarian">Vegetarian</option>
        </select>
      </form>
      <button id="clear">Clear</button>
      <section id="recipes"></section>
      <section id="about"></section>
    </main>
    <footer></footer>
  </body>
</html>
